<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paska Store</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <meta http-equiv="Content-Security-Policy" content="default-src * 'unsafe-inline' 'unsafe-eval'; script-src * 'unsafe-inline' 'unsafe-eval'; connect-src * 'unsafe-inline'; img-src * data: blob: 'unsafe-inline'; frame-src *; style-src * 'unsafe-inline';">
    <link rel="stylesheet" href="./style.css">
</head>
<body>
<header class="header">
    <div class="logo">🥐 Paska Store</div>

    <div class="header-actions">
        <div id="cart-icon">
            🛒 <span id="cart-count">0</span>
        </div>
    </div>
</header>
<div class="filters">
    <input type="text" id="search" placeholder="🔍 Пошук паски...">

    <select id="category">
        <option value="all">Всі</option>
        <option value="classic">Класичні</option>
        <option value="chocolate">Шоколадні</option>
        <option value="premium">Преміум</option>
    </select>
</div>
<main>
    <div class="pasky-container"></div>
</main>

<div id="paska-modal" class="modal">
    <div class="modal-content">
        <span class="close-modal">&times;</span>
        <div id="modal-body"></div>
    </div>
</div>

<aside id="cart-sidebar">
    <div class="cart-header">
        <h2>🛒 Кошик</h2>
        <span id="close-cart">&times;</span>
    </div>

    <div id="cart-items"></div>

    <div class="cart-footer">
        <div class="cart-total">
            Сума: <span id="total-price">0</span> грн
        </div>

        <input type="text" id="user-phone" placeholder="📱 Номер телефону">

        <button id="checkout-btn">Замовити</button>
    </div>
</aside>
    <script src="main.js"></script>
</body>
</html>
